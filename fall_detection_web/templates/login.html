<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập — Fall Detection</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.ico">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    :root {
      --bg:      #081018;
      --panel:   #132130;
      --panel-2: #0d1722;
      --text:    #f4f8ff;
      --muted:   #9bb1c8;
      --line:    #284158;
      --accent:  #12a9f5;
      --danger:  #ff453a;
      --ok:      #20c26a;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(18,169,245,.18) 0%, transparent 70%);
      color: var(--text);
      font-family: 'Inter', Arial, sans-serif;
      font-size: 15px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 40px 36px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,.45);
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #12a9f5 0%, #0e6fd1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .logo h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }
    .logo p {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    h2 {
      margin: 0 0 22px;
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type=text],
    input[type=password] {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(18,169,245,.14);
    }
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
    }
    .checkbox-wrap input {
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }
    button[type=submit] {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #12a9f5 0%, #0e6fd1 100%);
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }
    button[type=submit]:hover { opacity: .9; }
    button[type=submit]:active { transform: scale(.98); }
    .error-msg {
      background: rgba(255,69,58,.12);
      border: 1px solid rgba(255,69,58,.35);
      border-radius: 8px;
      color: var(--danger);
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div>
        <h1>Fall Detection</h1>
        <p>Control Panel</p>
      </div>
    </div>

    <h2>Đăng nhập</h2>

    {% if error %}
    <div class="error-msg">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/login" autocomplete="on">
      <label for="username">Tên đăng nhập</label>
      <input id="username" name="username" type="text" autocomplete="username"
             placeholder="admin" required autofocus value="{{ username or '' }}">

      <label for="password">Mật khẩu</label>
      <input id="password" name="password" type="password" autocomplete="current-password"
             placeholder="••••••••" required>

      <label class="checkbox-wrap">
        <input type="checkbox" name="remember" value="true">
        Lưu đăng nhập hạn 30d
      </label>

      <button type="submit">Đăng nhập →</button>
    </form>

    <div class="footer">
      Fall Detection Web &nbsp;·&nbsp;
      <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</body>
</html>
